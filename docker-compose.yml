services:
  web:
    build:
      dockerfile: Dockerfile
    container_name: auto_bot_web
    command: sh /app/docker/web.sh
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auto_bot_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      BOT_API_BASE_URL: http://web:8000/api
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build:
      dockerfile: Dockerfile
    container_name: auto_bot
    command: sh /app/docker/bot.sh
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auto_bot_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      BOT_API_BASE_URL: http://web:8000/api
    depends_on:
      web:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: auto_bot_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auto_bot_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: Europe/Minsk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
  static_data:
